<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndianWorker - Construction & Services</title>
    <link rel="icon" type="image/png" href="assets/Indian.png">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            background-color: #f9f9f9;
        }

        /* Header/Navbar Styles */
        header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    /* Changed to 0.1 for subtle glass effect */
    background-color: rgba(255, 255, 255, 0.05); 
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    /* Sticky positioning */
    position: fixed; /* Fixed works better for transparent hero layouts */
    width: 100%;
    top: 0;
    z-index: 1000;
    
    /* Remove heavy borders, use a very light one */
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
}

        .logo {
    font-size: 24px;
    font-weight: 700;
    color: #ffd700;
    display: flex;
    align-items: center;
    gap: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

        nav {
            display: flex;
            gap: 30px;
            align-items: center;
            flex: 1;
            margin-left: 80px;
        }

        nav button {
            background: none;
            border: none;
            text-decoration: none;
            color: white;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        nav button:hover {
            color: #ffd700;
        }

        .play-store-btn {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .play-store-btn:hover {
            transform: scale(1.05);
        }

        .play-store-btn img {
            height: 40px;
            width: auto;
        }

        /* Hero Section */
        .hero-section {
            width: 100%;
            height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .hero-text {
            text-align: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .hero-subtext {
            color: white;
            font-size: 18px;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        .hero-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Services Section */
        .services-section {
            padding: 80px 40px;
            background-color: #1a1a1a;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .services-section::before {
            content: 'SERVICES';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            z-index: 1;
        }

        .services-section .section-title {
            color: #ffd700;
            margin-bottom: 60px;
            position: relative;
            z-index: 2;
            font-size: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .services-section .section-title::after {
            display: none;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .service-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .service-card h3 {
            color: #ffd700;
            margin-bottom: 10px;
            font-size: 20px;
            font-weight: 700;
        }

        .service-card p {
            color: #ccc;
            line-height: 1.6;
        }

        /* About Section */
        .about-section {
            padding: 80px 40px;
            background-color: #1a1a1a;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .about-section::before {
            content: 'ABOUT';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            z-index: 1;
        }

        .about-section .section-title {
            color: #ffd700;
            margin-bottom: 60px;
            position: relative;
            z-index: 2;
            font-size: 48px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .about-section .section-title::after {
            display: none;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .about-text h2 {
            font-size: 36px;
            color: white;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .about-text p {
            color: #ccc;
            line-height: 1.9;
            margin-bottom: 18px;
            font-size: 16px;
        }

        .about-benefits {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border-left: 4px solid #ffd700;
            border-radius: 5px;
        }

        .benefit-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            color: #ccc;
            font-weight: 600;
        }

        .benefit-item::before {
            content: '✓';
            width: 30px;
            height: 30px;
            background-color: #ffd700;
            color: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: bold;
        }

        .about-image {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-image img {
            width: 100%;
            height: auto;
            max-width: 400px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 20px 50px rgba(255, 215, 0, 0.2);
        }

        .about-image::before {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background-color: #ffd700;
            border-radius: 20px;
            top: -20px;
            right: -20px;
            z-index: -1;
        }

        .about-image::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: #ffd700;
            border-radius: 15px;
            bottom: 40px;
            left: -30px;
            z-index: -1;
        }

        /* Contact Section */
        .contact-section {
            padding: 80px 40px;
            background-color: #1a1a1a;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .contact-section::before {
            content: 'CONTACT';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05);
            white-space: nowrap;
            z-index: 1;
        }

        .contact-section .section-title {
            color: #ffd700;
            margin-bottom: 60px;
            position: relative;
            z-index: 2;
            font-size: 48px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .contact-section .section-title::after {
            display: none;
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            position: relative;
            z-index: 2;
        }

        .contact-info h3 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
        }

        .contact-info > p {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #ccc;
        }

        .contact-info div {
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            align-items: flex-start;
            background: none;
            padding: 0;
            border-radius: 0;
        }

        .contact-info div span {
            font-size: 28px;
            flex-shrink: 0;
        }

        .contact-info div > div {
            display: block;
            background: none;
            padding: 0;
            border-radius: 0;
        }

        .contact-info div strong {
            display: block;
            font-size: 14px;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .contact-info div p {
            font-size: 16px;
            color: #ccc;
            margin: 0;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        .form-group input,
        .form-group textarea {
            padding: 14px;
            border: 2px solid #555;
            border-radius: 0;
            font-family: inherit;
            font-size: 14px;
            background: transparent;
            color: white;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: white;
            background: transparent;
            box-shadow: none;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 130px;
        }

        .submit-btn {
            background-color: #ffd700;
            color: black;
            padding: 14px;
            border: none;
            border-radius: 0;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #ffed4e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        /* Footer */
        footer {
            background-color: #1a1a1a;
            color: white;
            padding: 25px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        footer h3 {
            margin: 0;
            font-size: 16px;
        }

        footer p {
            margin: 0;
            font-size: 14px;
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin: 0;
            font-size: 18px;
        }

        .social-links a {
            color: #ff6b35;
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: bold;
        }

        .social-links a:hover {
            color: white;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: row;
                gap: 10px;
                padding: 12px 15px;
                justify-content: space-between;
            }

            nav {
                display: flex;
                gap: 10px;
                margin-left: 0;
                width: auto;
                flex-direction: row;
            }

            nav button {
                font-size: 13px;
                padding: 6px 8px;
                white-space: nowrap;
            }

            nav {
                gap: 8px;
                flex-wrap: wrap;
            }

            .logo span {
                display: none;
            }

            .logo {
                font-size: 16px;
                gap: 8px;
            }

            .logo img {
                width: 32px !important;
                height: 32px !important;
            }

            .play-store-btn img {
                height: 32px;
            }

            .section-title {
                font-size: 28px;
                margin-bottom: 30px;
            }

            .hero-text {
                font-size: 24px;
            }

            .hero-section {
                height: 50vh;
            }

            .about-section {
                padding: 50px 20px;
            }

            .about-section::before {
                font-size: 100px;
            }

            .about-section .section-title {
                font-size: 32px;
            }

            .about-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .about-text h2 {
                font-size: 24px;
            }

            .about-image {
                font-size: 100px;
                min-height: 250px;
            }

            .services-section {
                padding: 50px 20px;
            }

            .services-section::before {
                font-size: 100px;
            }

            .services-section .section-title {
                font-size: 32px;
            }

            .services-grid {
                grid-template-columns: 1fr;
            }

            .contact-section {
                padding: 50px 20px;
            }

            .contact-section::before {
                font-size: 100px;
            }

            .contact-section .section-title {
                font-size: 32px;
            }

            .contact-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .contact-info h3 {
                font-size: 20px;
            }

            .services-section,
            .about-section,
            .contact-section {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Navbar Component
        function Navbar() {
            const [activeSection, setActiveSection] = useState('home');

            const scrollToSection = (id) => {
                setActiveSection(id);
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <header>
                    <div className="logo">
                        <img src="assets/Indian.png" alt="IndianWorker Logo" style={{ width: '40px', height: '40px', borderRadius: '50%', objectFit: 'cover' }} />
                        <span>IndianWorker</span>
                    </div>
                    
                    <nav>
                        <button onClick={() => scrollToSection('home')}>Home</button>
                        <button onClick={() => scrollToSection('services')}>Services</button>
                        <button onClick={() => scrollToSection('about')}>About</button>
                    </nav>

                    <button className="play-store-btn" onClick={() => alert('Download from Play Store coming soon!')}>
                        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" />
                    </button>
                </header>
            );
        }

        // Hero Component
        function Hero() {
            return (
                <section className="hero-section" id="home" style={{ backgroundImage: 'url(assets/home.png)' }}>
                    <div className="hero-text">Welcome to IndianWorker</div>
                    <div className="hero-subtext">काम भी, कमाई भी, सम्मान भी,</div>
                </section>
            );
        }

        // Services Component
        function Services() {
            const services = [
                { icon: '🏢', title: 'Construction Workers', description: 'Professional construction services for residential and commercial projects.' },
                { icon: '🏭', title: 'Warehouse Workers', description: 'Skilled warehouse workers for efficient storage and logistics management.' },
                { icon: '🏗️', title: 'Factory Workers', description: 'Experienced factory workers for manufacturing and production operations.' },
                { icon: '📚', title: 'Training to Workers', description: 'Comprehensive training programs to enhance worker skills and efficiency.' },
                { icon: '🔧', title: 'Plumbing', description: 'Expert plumbing solutions for all your water and drainage needs.' },
                { icon: '⚡', title: 'Electrical', description: 'Licensed electrical work for safety and efficiency.' }
            ];

            return (
                <section className="services-section" id="services">
                    <h2 className="section-title">Our Services</h2>
                    <div className="services-grid">
                        {services.map((service, index) => (
                            <div key={index} className="service-card">
                                <div className="service-icon">{service.icon}</div>
                                <h3>{service.title}</h3>
                                <p>{service.description}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        // About Component
        function About() {
            return (
                <section className="about-section" id="about">
                    <h2 className="section-title">About Us</h2>
                    <div className="about-content">
                        <div className="about-text">
                            <h2>Why Choose IndianWorker?</h2>
                            <p>
                                IndianWorker is India's leading platform connecting skilled workers with customers seeking reliable construction, industrial, and home services.
                            </p>
                            <p>
                                With thousands of verified professionals, we ensure quality workmanship, transparent pricing, and customer satisfaction on every project.
                            </p>
                            <p>
                                Our mission is to make professional services accessible and affordable to everyone, while empowering skilled workers to grow their businesses.
                            </p>
                            <div className="about-benefits">
                                <div className="benefit-item">Verified Professionals</div>
                                <div className="benefit-item">Transparent Pricing</div>
                                <div className="benefit-item">100% Satisfaction Guarantee</div>
                                <div className="benefit-item">24/7 Customer Support</div>
                            </div>
                        </div>
                        <div className="about-image">
                            <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=400&h=500&fit=crop" alt="Professional worker" />
                        </div>
                    </div>
                </section>
            );
        }

        // Contact Component
        function Contact() {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                message: ''
            });

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                alert('Thank you for your message! We will contact you soon.');
                setFormData({ name: '', email: '', message: '' });
            };

            return (
                <section className="contact-section" id="contact">
                    <h2 className="section-title">Get In Touch</h2>
                    <div className="contact-content">
                        <div className="contact-info">
                            <h3>Don't Be Shy</h3>
                            <p>Feel free to get in touch with me. I am always open to discussing new projects, creative ideas or opportunities to be part of your visions.</p>
                            <div>
                                <span>✉️</span>
                                <div>
                                    <strong>Mail me</strong>
                                    <p>indianworker.in@gmail.com</p>
                                </div>
                            </div>
                            <div>
                                <span>📱</span>
                                <div>
                                    <strong>Call me</strong>
                                    <p>9579047919</p>
                                </div>
                            </div>
                        </div>
                        
                        <form className="contact-form" onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label htmlFor="name">Full Name</label>
                                <input
                                    type="text"
                                    id="name"
                                    name="name"
                                    value={formData.name}
                                    onChange={handleInputChange}
                                    placeholder="Enter your Name"
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label htmlFor="email">Email Address</label>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    value={formData.email}
                                    onChange={handleInputChange}
                                    placeholder="Enter a valid email address"
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label htmlFor="message">Message</label>
                                <textarea
                                    id="message"
                                    name="message"
                                    value={formData.message}
                                    onChange={handleInputChange}
                                    placeholder="Enter your message"
                                    required
                                ></textarea>
                            </div>
                            <button type="submit" className="submit-btn">Submit</button>
                        </form>
                    </div>
                </section>
            );
        }

        // Footer Component
        function Footer() {
            return (
                <footer>
                    <h3>IndianWorker</h3>
                    <p>काम भी, कमाई भी, सम्मान भी,</p>
                    <div className="social-links">
                        <a href="#" onClick={(e) => { e.preventDefault(); alert('Facebook coming soon!'); }}>f</a>
                        <a href="#" onClick={(e) => { e.preventDefault(); alert('Twitter coming soon!'); }}>𝕏</a>
                        <a href="#" onClick={(e) => { e.preventDefault(); alert('Instagram coming soon!'); }}>📷</a>
                        <a href="#" onClick={(e) => { e.preventDefault(); alert('LinkedIn coming soon!'); }}>in</a>
                    </div>
                    <p>&copy; 2024 IndianWorker. All rights reserved.</p>
                </footer>
            );
        }

        // Main App Component
        function App() {
            return (
                <>
                    <Navbar />
                    <Hero />
                    <Services />
                    <About />
                    <Contact />
                    <Footer />
                </>
            );
        }

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
