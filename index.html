<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndianWorker - Construction & Services</title>
    <link rel="icon" type="image/png" href="assets/Indian.png">
    <link rel="stylesheet" href="styles.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Navbar Component
        function Navbar() {
            const [activeSection, setActiveSection] = useState('home');

            const scrollToSection = (id) => {
                setActiveSection(id);
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                }
            };

            return (
                <header>
                    <div className="logo">
                        <img src="assets/Indian.png" alt="IndianWorker Logo" style={{ width: '40px', height: '40px', borderRadius: '50%', objectFit: 'cover' }} />
                        <span>IndianWorker</span>
                    </div>
                    
                    <nav>
                        <button onClick={() => scrollToSection('home')}>Home</button>
                        <button onClick={() => scrollToSection('services')}>Services</button>
                        <button onClick={() => scrollToSection('about')}>About</button>
                    </nav>

                    <button className="play-store-btn" onClick={() => alert('Download from Play Store coming soon!')}>
                        <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" />
                    </button>
                </header>
            );
        }

        // Hero Component
        function Hero() {
            return (
                <section className="hero-section" id="home" style={{ backgroundImage: 'url(assets/home.png)' }}>
                    <div className="hero-text">Welcome to IndianWorker</div>
                    <div className="hero-subtext">काम भी, कमाई भी, सम्मान भी,</div>
                </section>
            );
        }

        // Services Component
        function Services() {
            const services = [
                { icon: '🏢', title: 'Construction Workers', description: 'Professional construction services for residential and commercial projects.' },
                { icon: '🏭', title: 'Warehouse Workers', description: 'Skilled warehouse workers for efficient storage and logistics management.' },
                { icon: '🏗️', title: 'Factory Workers', description: 'Experienced factory workers for manufacturing and production operations.' },
                { icon: '📚', title: 'Training to Workers', description: 'Comprehensive training programs to enhance worker skills and efficiency.' },
                { icon: '🔧', title: 'Plumbing', description: 'Expert plumbing solutions for all your water and drainage needs.' },
                { icon: '⚡', title: 'Electrical', description: 'Licensed electrical work for safety and efficiency.' }
            ];

            return (
                <section className="services-section" id="services">
                    <h2 className="section-title">Our Services</h2>
                    <div className="services-grid">
                        {services.map((service, index) => (
                            <div key={index} className="service-card">
                                <div className="service-icon">{service.icon}</div>
                                <h3>{service.title}</h3>
                                <p>{service.description}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        // About Component
        function About() {
            return (
                <section className="about-section" id="about">
                    <h2 className="section-title">About Us</h2>
                    <div className="about-content">
                        <div className="about-text">
                            <h2>Why Choose IndianWorker?</h2>
                            <p>
                                IndianWorker is India's leading platform connecting skilled workers with customers seeking reliable construction, industrial, and home services.
                            </p>
                            <p>
                                With thousands of verified professionals, we ensure quality workmanship, transparent pricing, and customer satisfaction on every project.
                            </p>
                            <p>
                                Our mission is to make professional services accessible and affordable to everyone, while empowering skilled workers to grow their businesses.
                            </p>
                            <div className="about-benefits">
                                <div className="benefit-item">Verified Professionals</div>
                                <div className="benefit-item">Transparent Pricing</div>
                                <div className="benefit-item">100% Satisfaction Guarantee</div>
                                <div className="benefit-item">24/7 Customer Support</div>
                            </div>
                        </div>
                        <div className="about-image">
                            <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=400&h=500&fit=crop" alt="Professional worker" />
                        </div>
                    </div>
                </section>
            );
        }

        // Contact Component
        function Contact() {
            const [formData, setFormData] = useState({
                name: '',
                email: '',
                phone: '',
                message: ''
            });
            const [sending, setSending] = useState(false);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setSending(true);

                // Check if emailjs is loaded
                if (!window.emailjs) {
                    alert('Email service is loading. Please wait a moment and try again.');
                    setSending(false);
                    return;
                }

                const templateParams = {
                    title: 'New Contact Form Submission',
                    name: formData.name,
                    email: formData.email,
                    message: formData.message + '\n\nPhone: ' + formData.phone
                };

                window.emailjs.send('service_lj2lvm9', 'template_6jxj9ql', templateParams)
                    .then((response) => {
                        alert('Thank you! Your message has been sent successfully.');
                        setFormData({ name: '', email: '', phone: '', message: '' });
                        setSending(false);
                    })
                    .catch((error) => {
                        alert('Failed to send message. Error: ' + (error.text || error.message));
                        console.error('EmailJS error:', error);
                        setSending(false);
                    });
            };

            return (
                <section className="contact-section" id="contact">
                    <h2 className="section-title">Get In Touch</h2>
                    <div className="contact-content">
                        <div className="contact-info">
                            <h3>Don't Be Shy</h3>
                            <p>Feel free to get in touch with us. We are always open to discussing new projects requirements, Bulk Hiring or opportunities to be part of your visions.</p>
                            <div>
                                <span>✉️</span>
                                <div>
                                    <strong>Mail me</strong>
                                    <p>indianworker.in@gmail.com</p>
                                </div>
                            </div>
                            <div>
                                <span>📱</span>
                                <div>
                                    <strong>Call me</strong>
                                    <p>9579047919</p>
                                </div>
                            </div>
                        </div>
                        
                        <form className="contact-form" onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label htmlFor="name">Full Name</label>
                                <input
                                    type="text"
                                    id="name"
                                    name="name"
                                    value={formData.name}
                                    onChange={handleInputChange}
                                    placeholder="Enter your Name"
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label htmlFor="email">Email Address</label>
                                <input
                                    type="email"
                                    id="email"
                                    name="email"
                                    value={formData.email}
                                    onChange={handleInputChange}
                                    placeholder="Enter a valid email address"
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label htmlFor="phone">Phone Number</label>
                                <input
                                    type="tel"
                                    id="phone"
                                    name="phone"
                                    value={formData.phone}
                                    onChange={handleInputChange}
                                    placeholder="Enter your phone number"
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label htmlFor="message">Message</label>
                                <textarea
                                    id="message"
                                    name="message"
                                    value={formData.message}
                                    onChange={handleInputChange}
                                    placeholder="Enter your message"
                                    required
                                ></textarea>
                            </div>
                            <button type="submit" className="submit-btn" disabled={sending}>
                                {sending ? 'Sending...' : 'Submit'}
                            </button>
                        </form>
                    </div>
                </section>
            );
        }

        // Footer Component
        function Footer() {
            return (
                <footer>
                    <h3>IndianWorker</h3>
                    <p>काम भी, कमाई भी, सम्मान भी,</p>
                    
                    <p>&copy; 2025 IndianWorker. All rights reserved.</p>
                </footer>
            );
        }

        // Main App Component
        function App() {
            useEffect(() => {
                // Load EmailJS dynamically
                const loadEmailJS = () => {
                    return new Promise((resolve, reject) => {
                        // If already loaded
                        if (window.emailjs) {
                            window.emailjs.init('FOglBeof19V01eIHg');
                            resolve();
                            return;
                        }

                        const script = document.createElement('script');
                        // Updated reliable CDN link
                        script.src = 'https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js';
                        script.type = 'text/javascript';
                        script.async = true;

                        script.onload = () => {
                            // The newer SDK might need a tiny beat to attach to window
                            if (window.emailjs) {
                                window.emailjs.init('FOglBeof19V01eIHg');
                                resolve();
                            } else {
                                reject(new Error('EmailJS object not found on window'));
                            }
                        };

                        script.onerror = () => reject(new Error('Failed to load EmailJS library'));
                        document.head.appendChild(script);
                    });
                };

                loadEmailJS().catch((error) => {
                    console.error('EmailJS initialization error:', error);
                });
            }, []);

            return (
                <>
                    <Navbar />
                    <Hero />
                    <Services />
                    <About />
                    <Contact />
                    <Footer />
                </>
            );
        }

        // Render App
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
